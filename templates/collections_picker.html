{% extends "base.html" %}
{% block title %}Your collections - Materia Markets{% endblock %}
{% block content %}
<h2>Your collections</h2>
<table>
    <tr><th>Label</th><th></th></tr>
    {% for c in collections %}
    <tr>
        <td><a href="{{ url_for('view_collection', collection_id=c.id) }}">{{ c.label }}</a></td>
        <td><a href="{{ url_for('view_collection', collection_id=c.id) }}" class="btn">View</a></td>
    </tr>
    {% endfor %}
</table>
<p style="margin-top:1.5rem;"><a href="{{ url_for('new_collection') }}" class="btn">+ Add another collection</a></p>
{% endblock %}
