<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Manaticker{% endblock %}</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
<style>
    :root {
        --mat-green: #4ade80;
        --mat-blue: #60a5fa;
        --mat-purple: #c084fc;
    }
    * { box-sizing: border-box; }
    body {
        font-family: -apple-system, Segoe UI, sans-serif;
        background: radial-gradient(circle at 15% 0%, #1b1530 0%, #0f1115 45%) fixed;
        color: #e6e6e6;
        margin: 0;
        padding: 2rem;
        min-height: 100vh;
        box-sizing: border-box;
    }
    a { color: var(--mat-blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { margin-bottom: 0.25rem; }
    .subtitle { color: #9aa0a6; margin-bottom: 1.5rem; }
    .brand {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .brand img { width: 1.6rem; height: 1.6rem; }
    .brand span {
        font-weight: 700;
        font-size: 1.3rem;
        background: linear-gradient(90deg, var(--mat-green), var(--mat-blue), var(--mat-purple));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: 0.02em;
    }
    .tagline { color: #9aa0a6; font-size: 0.75rem; font-style: italic; margin-top: -0.2rem; }
    .topbar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; gap: 0.75rem; margin-bottom: 1.5rem; }
    .topbar nav { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; font-size: 0.85rem; color: #9aa0a6; }
    .flash { background: #3b2330; border: 1px solid #7f1d1d; color: #fca5a5; padding: 0.6rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.3rem; color: #9aa0a6; font-size: 0.85rem; }
    input, select { background: #1a1d24; border: 1px solid #2a2e38; color: #e6e6e6; padding: 0.5rem; border-radius: 6px; margin-bottom: 1rem; width: 100%; max-width: 360px; }
    input:focus, select:focus { outline: none; border-color: var(--mat-blue); box-shadow: 0 0 0 2px rgba(96,165,250,0.25); }
    button, .btn {
        display: inline-flex; align-items: center; justify-content: center;
        font-family: inherit; line-height: 1.2;
        background: linear-gradient(135deg, var(--mat-blue), var(--mat-purple));
        color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 999px;
        cursor: pointer; font-size: 0.9rem; font-weight: 600;
        transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    button:hover, .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(96,165,250,0.3); text-decoration: none; }
    .btn-danger { background: linear-gradient(135deg, #f87171, #ef4444); }
    .card {
        background: #1a1d24;
        border: 1px solid #2a2e38;
        border-radius: 14px;
        padding: 2rem;
        max-width: 420px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .auth-wrap { display: flex; min-height: 70vh; align-items: center; justify-content: center; }
    .auth-wrap .card { width: 100%; }
    .auth-wrap h2 { text-align: center; margin-top: 0; }
    .auth-wrap form { display: flex; flex-direction: column; align-items: center; }
    .auth-wrap input { text-align: left; }
    .auth-wrap button { width: 100%; margin-top: 0.5rem; }
    .auth-wrap p { text-align: center; }
    form.inline { display: inline; }
    table { border-collapse: collapse; width: 100%; background: #1a1d24; border-radius: 10px; overflow: hidden; }
    th, td { padding: 0.5rem 0.75rem; text-align: left; font-size: 0.85rem; }
    th { background: #22262f; color: #9aa0a6; text-transform: uppercase; font-size: 0.7rem; }
    tr:nth-child(even) { background: #20232b; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 1rem; }
    .table-scroll table { margin-bottom: 0; }

    @media (max-width: 640px) {
        body { padding: 1rem; }
        .brand span { font-size: 1.15rem; }
        .card { padding: 1.25rem; max-width: 100%; }
        th, td { padding: 0.45rem 0.5rem; font-size: 0.8rem; }
        button, .btn { padding: 0.55rem 1.1rem; font-size: 0.85rem; }
    }
</style>
</head>
<body>
    <div class="topbar">
        <div>
            <div class="brand">
                <img src="{{ url_for('static', filename='logo.svg') }}" alt="">
                <span>Manaticker</span>
            </div>
        </div>
        {% if current_user.is_authenticated %}
        <nav>
            <span>{{ current_user.email }}</span>
            <a href="{{ url_for('manage_collections') }}">Collections</a>
            <form class="inline" action="{{ url_for('logout') }}" method="post">
                {% include "_csrf.html" %}
                <button type="submit">Log out</button>
            </form>
        </nav>
        {% else %}
        <nav>
            <a href="{{ url_for('login') }}">Log in</a>
            <a href="{{ url_for('signup_view') }}" class="btn">Sign up</a>
        </nav>
        {% endif %}
    </div>

    {% for message in get_flashed_messages() %}
    <div class="flash">{{ message }}</div>
    {% endfor %}

    {% block content %}{% endblock %}
</body>
</html>
