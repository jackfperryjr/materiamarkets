{% extends "base.html" %}
{% block title %}Sign up - Materia Markets{% endblock %}
{% block content %}
<div class="auth-wrap">
<div class="card">
    <h2>Create your account</h2>
    <form method="post">
        {% include "_csrf.html" %}
        <label>Email</label>
        <input type="email" name="email" required>
        <label>Password</label>
        <input type="password" name="password" minlength="8" required>
        <label>Confirm password</label>
        <input type="password" name="confirm" minlength="8" required>
        <button type="submit">Sign up</button>
    </form>
    <p style="margin-top:1rem;color:#9aa0a6;">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
</div>
{% endblock %}
