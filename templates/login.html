{% extends "base.html" %}
{% block title %}Log in - Materia Markets{% endblock %}
{% block content %}
<div class="auth-wrap">
<div class="card">
    <h2>Welcome back</h2>
    <form method="post">
        {% include "_csrf.html" %}
        <label>Email</label>
        <input type="email" name="email" required>
        <label>Password</label>
        <input type="password" name="password" required>
        <button type="submit">Log in</button>
    </form>
    <p style="margin-top:1rem;color:#9aa0a6;">Need an account? <a href="{{ url_for('signup_view') }}">Sign up</a></p>
</div>
</div>
{% endblock %}
